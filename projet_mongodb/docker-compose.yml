services:
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - healthcare_network

  python:
    image: python:3.12
    container_name: python_app
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "sleep 5 && pip install -r requirements.txt && python migration.py"
    depends_on:
      - mongo
    networks:
      - healthcare_network

volumes:
  mongo_data:

networks:
  healthcare_network:
    driver: bridge
